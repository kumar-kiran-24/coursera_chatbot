<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #chat-box {
            width: 420px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px #aaa;
        }

        #messages {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
        }

        .msg {
            padding: 8px;
            margin: 10px 0;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .user { background: #d7e7ff; text-align: right; }
        .bot { background: #d8ffd7; }

        #inputBox {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #aaa;
        }

        #sendBtn {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div id="chat-box">
    <h2>VTU Assistant Chatbot</h2>

    <div id="messages"></div>

    <input type="text" id="inputBox" placeholder="Ask something…">
    <button id="sendBtn" type="button">Send</button>
</div>

<script>
    const API_URL = "http://127.0.0.1:8000/ask";

    document.getElementById("sendBtn").onclick = sendMessage;

    document.getElementById("inputBox").addEventListener("keypress", function (e) {
        if (e.key === "Enter") sendMessage();
    });

    function addMessage(text, type) {
        const box = document.createElement("div");
        box.className = "msg " + type;
        box.innerText = text;
        document.getElementById("messages").appendChild(box);
        document.getElementById("messages").scrollTop =
            document.getElementById("messages").scrollHeight;
    }

    async function sendMessage() {
        let question = document.getElementById("inputBox").value.trim();
        if (!question) return;

        addMessage(question, "user");
        document.getElementById("inputBox").value = "";

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question })
            });

            const data = await res.json();
            addMessage(data.response, "bot");

        } catch (err) {
            addMessage(" Error connecting to server", "bot");
        }
    }
</script>

</body>
</html>
